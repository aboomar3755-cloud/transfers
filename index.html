<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weekly Daily Transfer Tracker 🚀</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

input, table {
  margin: 20px auto;
}

table {
  border-collapse: collapse;
  width: 90%;
}

th, td {
  border: 1px solid #333;
  padding: 10px;
}

th {
  background: #1e293b;
}

.gold { color: gold; font-weight: bold; }
.silver { color: silver; font-weight: bold; }
.bronze { color: #cd7f32; font-weight: bold; }
</style>
</head>

<body>

<h2>📂 Upload Daily Excel</h2>
<p>Make sure your Excel has columns: <strong>Agent</strong> & <strong>Transfers</strong></p>

<label for="dayInput">Select Day for this Excel:</label>
<input type="date" id="dayInput">

<br><br>
<input type="file" id="fileInput" accept=".xlsx, .xls, .csv">

<h3 id="weekInfo"></h3>
<div id="leaderboard"></div>

<table id="weeklyTable">
  <thead>
    <tr id="tableHeader">
      <th>Agent</th>
      <th>Mon</th>
      <th>Tue</th>
      <th>Wed</th>
      <th>Thu</th>
      <th>Fri</th>
      <th>Weekly Total</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
// ✅ هيكل البيانات في localStorage
let stored = JSON.parse(localStorage.getItem("weeklyData")) || {
  weekStart: null,
  dailyData: {}
};

// 📅 دالة بداية الأسبوع (الإثنين)
function getMonday(d) {
  d = new Date(d);
  let day = d.getDay();
  let diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff));
}

// 🔄 تحقق من أسبوع جديد
function checkNewWeek(todayStr) {
  let todayMonday = getMonday(new Date(todayStr));
  let mondayStr = todayMonday.toDateString();

  if (stored.weekStart !== mondayStr) {
    stored = {
      weekStart: mondayStr,
      dailyData: {}
    };
    localStorage.setItem("weeklyData", JSON.stringify(stored));
  }
}

// 📂 قراءة ملف Excel
document.getElementById('fileInput').addEventListener('change', handleFile);

function handleFile(e) {
  const dayInput = document.getElementById('dayInput').value;
  if (!dayInput) {
    alert("Please select a day before uploading the file!");
    return;
  }

  checkNewWeek(dayInput);

  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, {type: 'array'});

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    addDailyData(json, dayInput);
  };

  reader.readAsArrayBuffer(file);
}

// ➕ إضافة بيانات اليوم المحدد
function addDailyData(rows, dayStr) {
  if (!stored.dailyData[dayStr]) stored.dailyData[dayStr] = {};

  rows.forEach(row => {
    let agent = row["Agent"];
    let transfers = Number(row["Transfers"]) || 0;

    if (!stored.dailyData[dayStr][agent]) stored.dailyData[dayStr][agent] = 0;
    stored.dailyData[dayStr][agent] += transfers;
  });

  localStorage.setItem("weeklyData", JSON.stringify(stored));
  updateUI();
}

// 📊 عرض جدول الأسبوع
function updateUI() {
  let tableBody = document.getElementById("tableBody");
  tableBody.innerHTML = "";

  document.getElementById("weekInfo").innerText =
    "Week Starting: " + stored.weekStart;

  // 1️⃣ اجمع كل Agents
  let agentsSet = new Set();
  for (let day in stored.dailyData) {
    for (let agent in stored.dailyData[day]) {
      agentsSet.add(agent);
    }
  }

  let agents = Array.from(agentsSet).sort();

  // 2️⃣ عرض بيانات كل يوم ومجموع الأسبوع
  agents.forEach(agent => {
    let row = document.createElement("tr");
    let total = 0;

    let tdAgent = document.createElement("td");
    tdAgent.innerText = agent;
    row.appendChild(tdAgent);

    // أيام الأسبوع من الإثنين للجمعة
    for (let i = 0; i < 5; i++) {
      let dayDate = new Date(stored.weekStart);
      dayDate.setDate(dayDate.getDate() + i);
      let dayStr = dayDate.toISOString().split('T')[0];

      let td = document.createElement("td");
      let val = stored.dailyData[dayStr] && stored.dailyData[dayStr][agent] ? stored.dailyData[dayStr][agent] : 0;
      td.innerText = val;
      total += val;
      row.appendChild(td);
    }

    let tdTotal = document.createElement("td");
    tdTotal.innerText = total;
    row.appendChild(tdTotal);

    tableBody.appendChild(row);
  });

  updateLeaderboard(agents);
}

// 🏆 عرض الـ Leaderboard
function updateLeaderboard(agents) {
  let totals = agents.map(agent => {
    let sum = 0;
    for (let day in stored.dailyData) {
      if (stored.dailyData[day][agent]) sum += stored.dailyData[day][agent];
    }
    return {agent, total: sum};
  });

  totals.sort((a,b) => b.total - a.total);

  let lb = document.getElementById("leaderboard");
  lb.innerHTML = "";

  if (totals[0]) lb.innerHTML += `<div class="gold">🥇 ${totals[0].agent} - ${totals[0].total}</div>`;
  if (totals[1]) lb.innerHTML += `<div class="silver">🥈 ${totals[1].agent} - ${totals[1].total}</div>`;
  if (totals[2]) lb.innerHTML += `<div class="bronze">🥉 ${totals[2].agent} - ${totals[2].total}</div>`;
}

// 🔄 تشغيل أولي
updateUI();
