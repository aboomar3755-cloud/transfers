<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Google Sheets Leaderboard</title>
<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
table { margin: 20px auto; border-collapse: collapse; width: 80%; }
th, td { border:1px solid #333; padding:10px; }
.highest { background:#0ea5e9; font-weight:bold; }
</style>
</head>
<body>

<h2>📊 Live Leaderboard</h2>

<table>
  <thead><tr id="tableHeader"></tr></thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
const DAILY_URL = "https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/gviz/tq?tqx=out:csv&sheet=DAILY";
const WEEKLY_URL = "https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/gviz/tq?tqx=out:csv&sheet=WEEKLY";

async function fetchCSV(url){
    const res = await fetch(url);
    const text = await res.text();
    const rows = text.trim().split("\n").map(r=> r.split(","));
    return rows;
}

async function updateLeaderboard(){
    const dailyData = await fetchCSV(DAILY_URL);
    const weeklyData = await fetchCSV(WEEKLY_URL);

    // اعمل Object للـ DAILY
    const headers = dailyData[0];
    const dataRows = dailyData.slice(1);
    const agents = {};
    const dates = [];

    dataRows.forEach(r=>{
        const agent = r[0];
        const transfers = Number(r[1]) || 0;
        const date = r[2];
        if(!dates.includes(date)) dates.push(date);
        if(!agents[agent]) agents[agent] = {};
        if(!agents[agent][date]) agents[agent][date] = 0;
        agents[agent][date] += transfers;
    });

    dates.sort((a,b)=> new Date(a)-new Date(b));

    // اعمل Header
    const header = ["Agent", ...dates, "Weekly Total"];
    const tableHeader = document.getElementById("tableHeader");
    tableHeader.innerHTML = "";
    header.forEach(h=>{
        const th = document.createElement("th");
        th.innerText = h;
        tableHeader.appendChild(th);
    });

    // اعمل Body
    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";

    const maxPerDay = {};
    dates.forEach(d=>{
        let max = 0;
        for(let a in agents){
            if((agents[a][d]||0) > max) max = agents[a][d];
        }
        maxPerDay[d] = max;
    });

    // اعرض كل Agent
    for(let a in agents){
        const tr = document.createElement("tr");
        let weeklyTotal = 0;
        const tdName = document.createElement("td");
        tdName.innerText = a;
        tr.appendChild(tdName);

        dates.forEach(d=>{
            const td = document.createElement("td");
            const val = agents[a][d] || 0;
            td.innerText = val;
            if(val === maxPerDay[d] && val>0) td.classList.add("highest");
            weeklyTotal += val;
            tr.appendChild(td);
        });

        const tdTotal = document.createElement("td");
        tdTotal.innerText = weeklyTotal;
        if(weeklyTotal === Math.max(...Object.values(agents).map(x=> Object.values(x).reduce((a,b)=>a+b,0)))) tdTotal.classList.add("highest");
        tr.appendChild(tdTotal);

        tableBody.appendChild(tr);
    }
}

// أول تحديث
updateLeaderboard();

// تحديث كل 1 دقيقة (60000 ms)
setInterval(updateLeaderboard,60000);

</script>
</body>
</html>
