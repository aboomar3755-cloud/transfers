
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Excel Transfer Tracker 🚀</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

table {
  margin: 20px auto;
  border-collapse: collapse;
  width: 60%;
}

th, td {
  border: 1px solid #333;
  padding: 10px;
}

.gold { color: gold; }
.silver { color: silver; }
.bronze { color: #cd7f32; }
</style>
</head>

<body>

<h2>📂 Upload Excel File</h2>

<input type="file" id="fileInput" accept=".xlsx, .xls">

<div id="leaderboard"></div>

<table>
  <thead>
    <tr>
      <th>Rank</th>
      <th>Agent</th>
      <th>Total Transfers</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
document.getElementById('fileInput').addEventListener('change', handleFile);

function handleFile(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, {type: 'array'});

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    processData(json);
  };

  reader.readAsArrayBuffer(file);
}

function processData(rows) {
  let totals = {};

  rows.forEach(row => {
    let agent = row["Agent"];
    let transfers = Number(row["Transfers"]);

    if (!totals[agent]) totals[agent] = 0;
    totals[agent] += transfers;
  });

  let sorted = Object.entries(totals).sort((a,b) => b[1] - a[1]);

  // Leaderboard
  let lb = document.getElementById("leaderboard");
  lb.innerHTML = "";

  if (sorted[0]) lb.innerHTML += `<div class="gold">🥇 ${sorted[0][0]} - ${sorted[0][1]}</div>`;
  if (sorted[1]) lb.innerHTML += `<div class="silver">🥈 ${sorted[1][0]} - ${sorted[1][1]}</div>`;
  if (sorted[2]) lb.innerHTML += `<div class="bronze">🥉 ${sorted[2][0]} - ${sorted[2][1]}</div>`;

  // Table
  let table = document.getElementById("tableBody");
  table.innerHTML = "";

  sorted.forEach((item, index) => {
    table.innerHTML += `<tr>
      <td>${index + 1}</td>
      <td>${item[0]}</td>
      <td>${item[1]}</td>
    </tr>`;
  });
}
</script>

</body>
</html>
