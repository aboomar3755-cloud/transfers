<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weekly Transfer Tracker 🚀</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

table {
  margin: 20px auto;
  border-collapse: collapse;
  width: 70%;
}

th, td {
  border: 1px solid #333;
  padding: 10px;
}

.gold { color: gold; }
.silver { color: silver; }
.bronze { color: #cd7f32; }
</style>
</head>

<body>

<h2>📂 Upload Daily Excel</h2>

<input type="file" id="fileInput" accept=".xlsx, .xls, .csv">

<h3 id="weekInfo"></h3>

<div id="leaderboard"></div>

<table>
  <thead>
    <tr>
      <th>Rank</th>
      <th>Agent</th>
      <th>Total Transfers</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
let stored = JSON.parse(localStorage.getItem("weeklyData")) || {
  weekStart: null,
  data: {}
};

// 📅 نحدد بداية الأسبوع (الإتنين)
function getMonday(d) {
  d = new Date(d);
  let day = d.getDay();
  let diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff)).toDateString();
}

// 🔄 تحقق لو أسبوع جديد
function checkNewWeek() {
  let todayMonday = getMonday(new Date());

  if (stored.weekStart !== todayMonday) {
    stored = {
      weekStart: todayMonday,
      data: {}
    };
    localStorage.setItem("weeklyData", JSON.stringify(stored));
  }
}

// 📂 قراءة الملف
document.getElementById('fileInput').addEventListener('change', handleFile);

function handleFile(e) {
  checkNewWeek();

  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, {type: 'array'});

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    processData(json);
  };

  reader.readAsArrayBuffer(file);
}

// 📊 تجميع الداتا
function processData(rows) {
  rows.forEach(row => {
    let agent = row["Agent"];
    let transfers = Number(row["Transfers"]);

    if (!stored.data[agent]) stored.data[agent] = 0;
    stored.data[agent] += transfers;
  });

  localStorage.setItem("weeklyData", JSON.stringify(stored));

  updateUI();
}

// 📈 عرض النتائج
function updateUI() {
  let sorted = Object.entries(stored.data).sort((a,b) => b[1] - a[1]);

  document.getElementById("weekInfo").innerText =
    "Week Starting: " + stored.weekStart;

  let lb = document.getElementById("leaderboard");
  lb.innerHTML = "";

  if (sorted[0]) lb.innerHTML += `<div class="gold">🥇 ${sorted[0][0]} - ${sorted[0][1]}</div>`;
  if (sorted[1]) lb.innerHTML += `<div class="silver">🥈 ${sorted[1][0]} - ${sorted[1][1]}</div>`;
  if (sorted[2]) lb.innerHTML += `<div class="bronze">🥉 ${sorted[2][0]} - ${sorted[2][1]}</div>`;

  let table = document.getElementById("tableBody");
  table.innerHTML = "";

  sorted.forEach((item, index) => {
    table.innerHTML += `<tr>
      <td>${index + 1}</td>
      <td>${item[0]}</td>
      <td>${item[1]}</td>
    </tr>`;
  });
}

// تشغيل أولي
checkNewWeek();
updateUI();
</script>

</body>
</html>
