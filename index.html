<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Weekly Leaderboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
}
table {
  margin: 20px auto;
  border-collapse: collapse;
  width: 90%;
}
th, td {
  border: 1px solid #333;
  padding: 8px;
}
th {
  background: #1e293b;
}
.highest {
  background: #0ea5e9 !important;
  font-weight: bold;
}
</style>
</head>
<body>

<h2>📊 Live Weekly Leaderboard (From Google Sheets)</h2>

<table>
  <thead><tr id="tableHeader"></tr></thead>
  <tbody id="tableBody"></tbody>
</table>

<script>

// 🌐 روابط الـ CSV من Google Sheets
const DAILY_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLLLk6nN-q9Ey6wz_j7WUdkfKQBQnoXldyG9Kxxx-1AvN_u3JpBk53Wj93imnQjPlKuEa1Vclf47Gx/pub?output=csv&sheet=DAILY";
const WEEKLY_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLLLk6nN-q9Ey6wz_j7WUdkfKQBQnoXldyG9Kxxx-1AvN_u3JpBk53Wj93imnQjPlKuEa1Vclf47Gx/pub?output=csv&sheet=WEEKLY";

// دالة تجلب CSV وتعمل تحويله لمصفوفة
async function fetchCSV(url) {
  const res = await fetch(url);
  const text = await res.text();
  const rows = text.trim().split("\n").map(r => r.split(","));
  return rows;
}

// الدالة الأساسية للتحديث
async function updateLeaderboard() {
  try {
    const dailyRows = await fetchCSV(DAILY_CSV_URL);

    // جمع البيانات
    const data = {};
    const dates = [];

    // تجاهل صف الهيدر
    dailyRows.slice(1).forEach(r => {
      const agent = r[0].trim();
      const transfers = Number(r[1]) || 0;
      const date = r[2].trim();

      if (!dates.includes(date)) dates.push(date);
      if (!data[agent]) data[agent] = {};
      if (!data[agent][date]) data[agent][date] = 0;
      data[agent][date] += transfers;
    });

    dates.sort((a, b) => new Date(a) - new Date(b));

    // بناء الهيدر
    const headerRow = ["Agent", ...dates, "Weekly Total"];
    const tableHeader = document.getElementById("tableHeader");
    tableHeader.innerHTML = "";
    headerRow.forEach(h => {
      const th = document.createElement("th");
      th.innerText = h;
      tableHeader.appendChild(th);
    });

    // إيجاد أعلى رقم لكل يوم
    const maxPerDay = {};
    dates.forEach(d => {
      let max = 0;
      for (let a in data) {
        const val = data[a][d] || 0;
        if (val > max) max = val;
      }
      maxPerDay[d] = max;
    });

    // حذف الـ Body القديم
    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";

    // تحديد أعلى مجموع أسبوعي
    let globalMaxWeekly = 0;
    const weeklyTotals = {};

    Object.keys(data).forEach(agent => {
      let total = 0;
      dates.forEach(d => total += data[agent][d] || 0);
      weeklyTotals[agent] = total;
      if (total > globalMaxWeekly) globalMaxWeekly = total;
    });

    // بناء الـ Rows
    Object.keys(data).forEach(agent => {
      const tr = document.createElement("tr");

      const tdAgent = document.createElement("td");
      tdAgent.innerText = agent;
      tr.appendChild(tdAgent);

      let agentWeeklyTotal = 0;

      dates.forEach(d => {
        const td = document.createElement("td");
        const val = data[agent][d] || 0;
        td.innerText = val;
        if (val === maxPerDay[d] && val > 0) td.classList.add("highest");
        agentWeeklyTotal += val;
        tr.appendChild(td);
      });

      const tdTotal = document.createElement("td");
      tdTotal.innerText = agentWeeklyTotal;
      if (agentWeeklyTotal === globalMaxWeekly && globalMaxWeekly > 0) {
        tdTotal.classList.add("highest");
      }
      tr.appendChild(tdTotal);

      tableBody.appendChild(tr);
    });

  } catch (err) {
    console.error("Error updating leaderboard:", err);
  }
}

// أول تحميل
updateLeaderboard();

// تحديث كل دقيقة
setInterval(updateLeaderboard, 60000);

</script>

</body>
</html>
